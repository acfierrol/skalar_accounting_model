[project]
name = "skalar-accounting"
version = "0.1.0"
description = "Cash-basis accounting model (EIR / amortized-cost) consuming the capital-mechanics engine."
requires-python = ">=3.13"
dependencies = [
    "skalar-capital-mechanics",
    "pydantic>=2.9",
    "openpyxl>=3.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/skalar_accounting"]
