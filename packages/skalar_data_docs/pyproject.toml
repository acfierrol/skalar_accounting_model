[project]
name = "skalar-data-docs"
version = "0.1.0"
description = "Dataset-documentation tooling: render BigQuery schema/profile into the docs/datasets tree."
requires-python = ">=3.13"
dependencies = [
    "skalar-data-access",
    "pydantic>=2.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/skalar_data_docs"]
