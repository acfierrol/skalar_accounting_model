[project]
name = "skalar-viz"
version = "0.1.0"
description = "Visualization layer: collections->sharing waterfall + cohort/time run-off triangle."
requires-python = ">=3.13"
dependencies = [
    "skalar-capital-mechanics",
    "matplotlib>=3.8",
    "numpy>=1.26",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/skalar_viz"]
