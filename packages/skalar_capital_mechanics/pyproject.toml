[project]
name = "skalar-capital-mechanics"
version = "0.1.0"
description = "Skalar capital-mechanics engine: domain models, deal parameters, collections, cash events."
requires-python = ">=3.13"
dependencies = [
    "skalar-data-access",
    "pydantic>=2.9",
    "pyarrow>=17.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/skalar_capital_mechanics"]
