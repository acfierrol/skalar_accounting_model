[project]
name = "skalar-data-access"
version = "0.1.0"
description = "Read-only BigQuery access layer (guard, Jinja SQL, cost discipline) for the Skalar model."
requires-python = ">=3.13"
dependencies = [
    "google-cloud-bigquery>=3.25",
    "google-auth>=2.30",
    "pydantic>=2.9",
    "pydantic-settings>=2.5",
    "jinja2>=3.1",
    "sqlparse>=0.5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/skalar_data_access"]
