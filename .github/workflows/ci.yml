name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync workspace
        run: uv sync --all-groups --locked

      - name: Ruff (lint)
        run: uv run ruff check

      - name: Ruff (format)
        run: uv run ruff format --check

      - name: Mypy (strict)
        run: uv run mypy

      - name: Import-linter (layer contracts)
        run: uv run lint-imports

      - name: Pytest (offline; live BigQuery tests are deselected without ADC)
        run: uv run pytest -m "not bq"
