# Local hooks run through uv so versions match the locked toolchain.
# Install once with: uv run pre-commit install
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types: [python]
        pass_filenames: false
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]
        pass_filenames: false
      - id: mypy
        name: mypy --strict
        entry: uv run mypy
        language: system
        types: [python]
        pass_filenames: false
      - id: import-linter
        name: import-linter contracts
        entry: uv run lint-imports
        language: system
        types: [python]
        pass_filenames: false
      - id: pytest
        name: pytest (offline)
        entry: uv run pytest -m "not bq" -q
        language: system
        types: [python]
        pass_filenames: false
